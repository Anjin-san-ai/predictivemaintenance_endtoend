# Deploy COMPASS-Demo (Next.js) to Azure App Service
# Mirrors the pattern used by a400-webapp/main_a400-webapp.yml

name: Build and deploy COMPASS to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'COMPASS-Demo/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: COMPASS-Demo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: COMPASS-Demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Point chatbot API at the deployed a400-webapp Azure URL
          A400_API_URL: ${{ secrets.A400_API_URL }}

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: compass-app
          path: |
            COMPASS-Demo/.next
            COMPASS-Demo/public
            COMPASS-Demo/src/data
            COMPASS-Demo/package.json
            COMPASS-Demo/package-lock.json
            COMPASS-Demo/next.config.ts

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: compass-app

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'compass-demo'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_COMPASS }}

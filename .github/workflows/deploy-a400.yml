# Deploy a400-webapp (Express/Node.js) to Azure App Service
# Copied from a400-webapp/.github/workflows/main_a400-webapp.yml and
# updated to run from the mono-repo root.

name: Build and deploy a400-webapp to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'a400-webapp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: a400-webapp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: a400-webapp/package-lock.json

      - name: Install and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: a400-node-app
          path: a400-webapp
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build


    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: a400-node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'a400-webapp'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A400 }}
